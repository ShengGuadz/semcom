<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图像语义通信接收端</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .comparison-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .panel { background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        .image-container { height: 350px; background: #f0f0f0; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
        .image-container img { max-height: 100%; max-width: 100%; object-fit: contain; }
        .metrics-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .metric-item { padding: 15px; border-radius: 10px; text-align: center; color: white; }
        .panel.traditional .metric-item { background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%); }
        .panel.semantic .metric-item { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .metric-value { font-size: 1.8em; font-weight: bold; }
        .badge { background: #4caf50; color: white; padding: 5px 15px; border-radius: 20px; margin: 5px; display:inline-block;}
        .header { background: rgba(255,255,255,0.95); padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        /* 新增平均值对比栏样式 */
        .avg-bar { display: flex; justify-content: space-between; margin-top: 10px; background: #eee; padding: 10px; border-radius: 8px; font-size: 0.9em; color: #333;}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📡 语义通信系统接收端</h1>
            <div>
                <span class="badge">实时接收</span>
                <span class="badge" style="background:#667eea">SNR: <span id="current_snr">--</span>dB</span>
            </div>
        </div>

        <div class="comparison-grid">
            <div class="panel traditional">
                <div style="text-align:center; font-size:1.5em; color:#ff9800; font-weight:bold; margin-bottom:10px;">📶 传统通信 (JPEG)</div>
                <div class="image-container" id="container_traditional">等待接收...</div>
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div>传输大小</div>
                        <div class="metric-value"><span id="traditional_size">--</span> KB</div>
                    </div>
                    <div class="metric-item">
                        <div>已接收数量</div> <div class="metric-value" id="img_count_trad">--</div>
                    </div>
                    <div class="metric-item">
                        <div>PSNR</div>
                        <div class="metric-value"><span id="traditional_psnr">--</span> dB</div>
                    </div>
                    <div class="metric-item">
                        <div>SSIM</div>
                        <div class="metric-value" id="traditional_ssim">--</div>
                    </div>
                </div>
                <div class="avg-bar">
                    <span>平均 PSNR: <b id="avg_trad_psnr">--</b></span>
                    <span>平均 SSIM: <b id="avg_trad_ssim">--</b></span>
                </div>
            </div>

            <div class="panel semantic">
                <div style="text-align:center; font-size:1.5em; color:#667eea; font-weight:bold; margin-bottom:10px;">🚀 语义通信</div>
                <div class="image-container" id="container_semantic">等待接收...</div>
                <div class="metrics-grid">
                    <div class="metric-item">
                        <div>特征大小</div>
                        <div class="metric-value"><span id="semantic_size">--</span> KB</div>
                    </div>
                    <div class="metric-item">
                        <div>已接收数量</div> <div class="metric-value" id="img_count_sem">--</div>
                    </div>
                    <div class="metric-item">
                        <div>PSNR</div>
                        <div class="metric-value"><span id="semantic_psnr">--</span> dB</div>
                    </div>
                    <div class="metric-item">
                        <div>SSIM</div>
                        <div class="metric-value" id="semantic_ssim">--</div>
                    </div>
                </div>
                <div class="avg-bar">
                    <span>平均 PSNR: <b id="avg_sem_psnr">--</b></span>
                    <span>平均 SSIM: <b id="avg_sem_ssim">--</b></span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <script>
        const socket = io();

        socket.on("message", (data) => {
            document.getElementById("current_snr").textContent = data.snr;

            // Update Images
            document.getElementById("container_traditional").innerHTML = `<img src="${data.traditional_image_url}?t=${new Date().getTime()}">`;
            document.getElementById("container_semantic").innerHTML = `<img src="${data.semantic_image_url}?t=${new Date().getTime()}">`;

            // JPEG Stats
            document.getElementById("traditional_size").textContent = data.traditional_image_size;
            document.getElementById("traditional_psnr").textContent = data.traditional_psnr;
            document.getElementById("traditional_ssim").textContent = data.traditional_ssim;
            document.getElementById("img_count_trad").textContent = data.image_count; // 显示数量

            // Semantic Stats
            document.getElementById("semantic_size").textContent = data.semantic_feature_size;
            document.getElementById("semantic_psnr").textContent = data.semantic_psnr;
            document.getElementById("semantic_ssim").textContent = data.semantic_ssim;
            document.getElementById("img_count_sem").textContent = data.image_count; // 显示数量

            // Averages
            document.getElementById("avg_trad_psnr").textContent = data.avg_trad_psnr;
            document.getElementById("avg_trad_ssim").textContent = data.avg_trad_ssim;
            document.getElementById("avg_sem_psnr").textContent = data.avg_sem_psnr;
            document.getElementById("avg_sem_ssim").textContent = data.avg_sem_ssim;
        });
    </script>
</body>
</html>
