<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像语义通信发送端</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        h1 { color: #667eea; font-size: 2em; margin-bottom: 5px; }
        .panel {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-bottom: 25px;
        }
        .panel-title {
            font-size: 1.4em;
            color: #667eea;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
            text-align: center;
            font-weight: bold;
        }
        .image-container {
            width: 100%;
            height: 400px;
            background: #f0f0f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #ddd;
        }
        .image-container img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* 指标网格 - 改为3列以容纳更多数据 */
        .info-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .info-item {
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .bg-blue { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .bg-orange { background: linear-gradient(135deg, #ff9800 0%, #ff5722 100%); }
        .bg-purple { background: linear-gradient(135deg, #9c27b0 0%, #e040fb 100%); }

        .info-label { font-size: 0.85em; opacity: 0.9; margin-bottom: 5px; }
        .info-value { font-size: 1.5em; font-weight: bold; }
        .info-unit { font-size: 0.8em; margin-left: 3px; }

        .status-bar {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-around;
            align-items: center;
        }
        .status-item { text-align: center; }
        .status-label { color: #666; font-size: 0.9em; margin-bottom: 5px; }
        .status-value { color: #667eea; font-size: 1.4em; font-weight: bold; }
        .badge { background: #4caf50; color: white; padding: 4px 12px; border-radius: 15px; font-size: 0.85em; vertical-align: middle; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 语义通信系统 <span class="badge">发送端</span></h1>
        </header>

        <div class="panel">
            <div class="panel-title">🖼️ 实时传输监控</div>
            <div class="image-container" id="container_original">
                <div class="placeholder">等待传输...</div>
            </div>

            <div class="info-grid">
                <div class="info-item bg-orange">
                    <div class="info-label">JPEG 大小</div>
                    <div class="info-value" id="original_size">--</div>
                    <span class="info-unit">KB</span>
                </div>
                <div class="info-item bg-blue">
                    <div class="info-label">语义特征大小</div>
                    <div class="info-value" id="semantic_size">--</div>
                    <span class="info-unit">KB</span>
                </div>
                <div class="info-item bg-purple">
                    <div class="info-label">压缩比提升</div>
                    <div class="info-value" id="comp_ratio">--</div>
                    <span class="info-unit">x</span>
                </div>

                <div class="info-item bg-orange">
                    <div class="info-label">JPEG 总时延 (RTT)</div>
                    <div class="info-value" id="rtt_jpeg">--</div>
                    <span class="info-unit">ms</span>
                </div>
                <div class="info-item bg-blue">
                    <div class="info-label">语义 总时延 (RTT)</div>
                    <div class="info-value" id="rtt_sem">--</div>
                    <span class="info-unit">ms</span>
                </div>
                <div class="info-item bg-purple">
                    <div class="info-label">传输状态</div>
                    <div class="info-value" style="font-size: 1.2em;">Running</div>
                </div>

                <div class="info-item bg-orange" style="opacity: 0.8;">
                    <div class="info-label">JPEG 编码耗时</div>
                    <div class="info-value" id="enc_jpeg">--</div>
                    <span class="info-unit">ms</span>
                </div>
                <div class="info-item bg-blue" style="opacity: 0.8;">
                    <div class="info-label">语义 编码耗时</div>
                    <div class="info-value" id="enc_sem">--</div>
                    <span class="info-unit">ms</span>
                </div>
                 <div class="info-item bg-purple" style="opacity: 0.8;">
                    <div class="info-label">已处理图片</div>
                    <div class="info-value" id="image_count_grid">0</div>
                </div>
            </div>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">平均 JPEG 总时延</div>
                <div class="status-value" id="avg_rtt_jpeg">--</div>
            </div>
            <div class="status-item">
                <div class="status-label">平均语义总时延</div>
                <div class="status-value" id="avg_rtt_sem">--</div>
            </div>
            <div class="status-item">
                <div class="status-label">平均编码耗时 (Sem)</div>
                <div class="status-value" id="avg_enc_sem">--</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.3.2/socket.io.min.js"></script>
    <script>
        const socket = io();
        let imageCount = 0;

        let totalRttSem = 0;
        let totalRttJpeg = 0;
        let totalEncSem = 0;

        socket.on("message", (data) => {
            // 1. 更新图像
            const container = document.getElementById("container_original");
            container.innerHTML = `<img src="${data.original_image_url}?t=${new Date().getTime()}">`;

            // 2. 提取数据
            const rttSem = (data.rtt_semantic * 1000);
            const rttJpeg = (data.rtt_jpeg * 1000);
            const encSem = (data.encode_semantic * 1000);
            const encJpeg = (data.encode_jpeg * 1000);

            // 3. 更新实时网格
            document.getElementById("original_size").textContent = data.original_image_size;
            document.getElementById("semantic_size").textContent = data.semantic_feature_size;
            const ratio = data.semantic_feature_size > 0 ? (data.original_image_size / data.semantic_feature_size).toFixed(1) : "Inf";
            document.getElementById("comp_ratio").textContent = ratio;

            document.getElementById("rtt_sem").textContent = rttSem.toFixed(1);
            document.getElementById("rtt_jpeg").textContent = rttJpeg.toFixed(1);
            document.getElementById("enc_sem").textContent = encSem.toFixed(1);
            document.getElementById("enc_jpeg").textContent = encJpeg.toFixed(1);

            // 4. 更新累计平均
            imageCount++;
            totalRttSem += rttSem;
            totalRttJpeg += rttJpeg;
            totalEncSem += encSem;

            document.getElementById("image_count_grid").textContent = imageCount;
            document.getElementById("avg_rtt_sem").textContent = (totalRttSem / imageCount).toFixed(1) + " ms";
            document.getElementById("avg_rtt_jpeg").textContent = (totalRttJpeg / imageCount).toFixed(1) + " ms";
            document.getElementById("avg_enc_sem").textContent = (totalEncSem / imageCount).toFixed(1) + " ms";
        });
    </script>
</body>
</html>
